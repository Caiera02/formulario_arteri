<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Arteri Imóveis</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 3L2 12h3v8h14v-8h3L12 3z' fill='%23e23b3b'/><path d='M6 13v6h12v-6H6z' fill='%230d2a52'/><path d='M10 19v-4h4v4h-4z' fill='%23ffffff'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-escuro: #0d2a52;
            --azul-medio: #16467f;
            --azul-claro: #2a6fc9;
            --vermelho: #e23b3b;
            --vermelho-escuro: #b32626;
            --cinza-bg: #f8fafc;
            --cinza-borda: #d8dee9;
            --branco: #ffffff;
            --texto: #1f2a44;
            --sombra: 0 20px 40px rgba(13, 42, 82, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0d2a52 0%, #16467f 60%, #2a6fc9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: var(--sombra);
            padding: 40px 35px;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--azul-escuro);
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .header h1 .logo {
            background: var(--vermelho);
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 20px;
            font-weight: 800;
        }

        .header p {
            font-size: 13.5px;
            color: var(--texto);
            opacity: 0.8;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--azul-medio);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            padding: 12px 16px;
            border: 1.5px solid var(--cinza-borda);
            border-radius: 10px;
            font-size: 14.5px;
            background: #fbfcfe;
            outline: none;
            transition: all 0.25s ease;
        }

        input:focus {
            border-color: var(--azul-claro);
            box-shadow: 0 0 0 3px rgba(42, 111, 201, 0.15);
            background: #fff;
        }

        .btn-submit {
            background: linear-gradient(120deg, var(--vermelho), var(--vermelho-escuro));
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.25s ease;
            box-shadow: 0 6px 18px rgba(226, 59, 59, 0.3);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 10px 22px rgba(226, 59, 59, 0.4);
        }

        .error-container {
            background: #fff5f5;
            border-left: 4px solid var(--vermelho);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: var(--vermelho-escuro);
            font-size: 13px;
            font-weight: 500;
        }

        .error-container ul {
            list-style: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="header">
            <h1><span class="logo">ARTERI</span> Imóveis</h1>
            <p>Painel de Controle e Gerenciamento de Fichas</p>
        </div>

        {% if form.errors %}
        <div class="error-container">
            <strong>Erro ao tentar logar:</strong>
            <ul>
                <li>Usuário ou senha incorretos. Por favor, tente novamente.</li>
            </ul>
        </div>
        {% endif %}

        <form method="POST" action="{% url 'fichas:login' %}">
            {% csrf_token %}
            {% if request.GET.next %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">
            {% endif %}
            <div class="field">
                <label for="id_username">Usuário</label>
                <input type="text" name="username" id="id_username" required placeholder="Digite seu usuário" autofocus>
            </div>
            <div class="field">
                <label for="id_password">Senha</label>
                <input type="password" name="password" id="id_password" required placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn-submit">Entrar no Painel</button>
        </form>
    </div>

</body>

</html>
